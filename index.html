<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115 逗點教室會考升學制度｜師資檢定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root { --comma-blue: #3b82f6; --comma-dark: #1e293b; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #334155; }
        .bg-comma-blue { background-color: var(--comma-blue); }
        .text-comma-blue { color: var(--comma-blue); }
        .border-comma-blue { border-color: var(--comma-blue); }
        
        .radio-custom:checked + label { background-color: #eff6ff; border-color: var(--comma-blue); }
        .checkbox-custom:checked + label { background-color: #eff6ff; border-color: var(--comma-blue); }
        
        /* 隱藏區塊 */
        .hidden-view { display: none !important; }
        
        /* 載入動畫 */
        .loader { border-top-color: var(--comma-blue); -webkit-animation: spinner 1s ease-in-out infinite; animation: spinner 1s ease-in-out infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <header class="w-full max-w-3xl bg-white rounded-t-2xl shadow-sm border-b-4 border-comma-blue p-6 flex flex-col items-center justify-center text-center">
        <img src="./逗點教室LOGO.png" alt="COMMA Logo" class="h-12 mb-4 object-contain" onerror="this.outerHTML='<div class=\'text-2xl font-black text-slate-800 mb-2\'>COMMA</div>'">
        <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-wide">115 逗點教室會考升學制度</h1>
        <p class="text-comma-blue font-bold tracking-widest mt-1">【 師資檢定 】</p>
    </header>

    <main class="w-full max-w-3xl bg-white rounded-b-2xl shadow-lg p-6 md:p-10 mb-10 relative min-h-[400px]">
        
        <div id="loadingOverlay" class="hidden-view absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center rounded-b-2xl">
            <div class="loader border-4 border-slate-200 rounded-full w-12 h-12 mb-4"></div>
            <p class="text-slate-600 font-bold animate-pulse" id="loadingText">考卷批改中，並同步成績至雲端...</p>
        </div>

        <div id="view-login" class="flex flex-col items-center justify-center py-10">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                <span class="text-4xl">🧑‍🏫</span>
            </div>
            <h2 class="text-xl font-bold text-slate-700 mb-6">歡迎參加師資檢定，請先輸入您的真實姓名</h2>
            <input type="text" id="teacherName" placeholder="例如：景崴老師" class="w-full max-w-sm px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-center font-bold text-lg shadow-sm mb-6">
            <button onclick="startTest()" class="bg-comma-blue text-white px-10 py-3 rounded-xl font-bold text-lg hover:bg-blue-600 transition active:scale-95 shadow-md">開始測驗 🚀</button>
        </div>

        <div id="view-test" class="hidden-view">
            <div class="flex justify-between items-end mb-6 border-b border-slate-100 pb-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800" id="testTitle">📝 測驗進行中</h2>
                    <p class="text-sm text-slate-500 mt-1">作答者：<span id="displayName" class="font-bold text-comma-blue"></span></p>
                </div>
                <div class="text-right">
                    <span class="bg-blue-100 text-comma-blue font-bold px-3 py-1 rounded-full text-xs">滿分 100 分</span>
                </div>
            </div>
            
            <div id="questionsContainer" class="space-y-8 mb-8"></div>

            <div class="border-t border-slate-200 pt-6 text-center">
                <p id="errorMessage" class="text-red-500 font-bold mb-4 hidden-view">⚠️ 還有題目尚未作答完成喔！</p>
                <button onclick="submitTest()" class="bg-comma-blue text-white px-12 py-4 rounded-xl font-black text-lg hover:bg-blue-600 transition shadow-lg w-full md:w-auto">交卷結算 💯</button>
            </div>
        </div>

        <div id="view-result" class="hidden-view flex flex-col items-center justify-center py-8">
            <h2 class="text-2xl font-black text-slate-800 mb-2">測驗結果</h2>
            <div class="relative w-40 h-40 flex items-center justify-center my-6">
                <svg class="absolute inset-0 w-full h-full transform -rotate-90">
                    <circle cx="80" cy="80" r="70" fill="none" stroke="#f1f5f9" stroke-width="12"></circle>
                    <circle id="scoreCircle" cx="80" cy="80" r="70" fill="none" stroke="var(--comma-blue)" stroke-width="12" stroke-dasharray="439.8" stroke-dashoffset="439.8" stroke-linecap="round" class="transition-all duration-1000 ease-out"></circle>
                </svg>
                <div class="text-center z-10">
                    <span id="finalScore" class="text-5xl font-black text-comma-blue">0</span>
                    <span class="text-slate-500 font-bold text-sm block">/ 100 分</span>
                </div>
            </div>
            
            <p id="resultMessage" class="text-lg font-bold text-slate-700 mb-8 text-center"></p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-lg">
                <button onclick="showReview()" class="bg-slate-100 text-slate-700 border border-slate-300 px-4 py-3 rounded-xl font-bold hover:bg-slate-200 transition">🔍 錯題檢討</button>
                <button id="btnRetest" onclick="startRetest()" class="bg-orange-500 text-white px-4 py-3 rounded-xl font-bold hover:bg-orange-600 transition shadow-sm">🔁 錯題重測</button>
                <button onclick="restartFullTest()" class="bg-comma-blue text-white px-4 py-3 rounded-xl font-bold hover:bg-blue-600 transition shadow-sm">🔄 重新測驗</button>
            </div>
        </div>

        <div id="view-review" class="hidden-view">
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                <h2 class="text-xl font-bold text-slate-800">🔍 錯題檢討</h2>
                <button onclick="backToResult()" class="text-slate-500 font-bold hover:text-slate-700 bg-slate-100 px-3 py-1 rounded-lg">返回成績 &times;</button>
            </div>
            <div id="reviewContainer" class="space-y-6 mb-8"></div>
            <div class="text-center border-t border-slate-200 pt-6">
                <button onclick="startRetest()" class="bg-orange-500 text-white px-10 py-3 rounded-xl font-bold hover:bg-orange-600 transition shadow-md">立刻進行錯題重測 🚀</button>
            </div>
        </div>

    </main>

    <footer class="text-slate-400 text-xs font-bold text-center">
        © 2026 COMMA AI WORKSHOP | 內部師資培訓專用
    </footer>

    <script>
        // ==========================================
        // 🚀 貼上 Google Apps Script 的網頁應用程式網址
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzhtEEWxux-kyr81tD1h3q9xzkkG0Acf6-iFxpoAIaTRQz-qq5qHIae-F2AzwClYLP9/exec"; 
        // ==========================================

        const questionsData = [
            { id: 1, type: "single", text: "作文的評比是在什麼階段會採計到？", options: ["總積分", "總積點", "單科比序比國文的時候"], ans: [0] },
            { id: 2, type: "single", text: "免試入學志工服務時數需要幾小時？", options: ["30小時", "34小時", "38小時"], ans: [1] }, 
            { id: 3, type: "single", text: "大園高中115年有多少優免名額給大園國中？", options: ["9", "18", "19"], ans: [1] },
            { id: 4, type: "single", text: "大園高中115年有多少優免名額給青埔國中？", options: ["9", "8", "19"], ans: [1] },
            { id: 5, type: "multi", text: "什麼是免試入學？", options: ["不用考試即可進高中", "不用參加入學考試", "依據國中在校表現與會考成績等多元資料來分發入學"], ans: [1, 2] },
            { id: 6, type: "multi", text: "哪些學校有特招？", options: ["中大壢中", "大園高中", "育達高中", "啟英高中"], ans: [0, 1, 2, 3] },
            { id: 7, type: "single", text: "當桃連區免試入學的總積分完全相同且名額不足時，下列哪一項敘述最正確？", options: ["只比較國文與數學兩科成績，分數高者優先錄取", "直接抽籤決定，不再看其他項目", "仍須依規定進行同分比序，因此志願序積分、教育會考等級標示總點數與單科標示，都可能影響最終錄取結果", "只要兩人會考總級分相同，就一定同時錄取"], ans: [2] },
            { id: 8, type: "multi", text: "有哪些普通高中去年有開資優班？", options: ["武陵高中", "大園高中", "中大壢中", "觀音高中"], ans: [0, 1, 2] },
            { id: 9, type: "single", text: "特殊身分佔學校原錄取人數的幾%？", options: ["25%", "10%", "2%"], ans: [2] },
            { id: 10, type: "single", text: "寫作分為3級分時，會拿到多少積分？", options: ["3分", "2分", "1分"], ans: [1] },
            { id: 11, type: "single", text: "情境題：思誼(國A+、數A、英A++、社A+、自A+、作文4級分、身心健康、低收入戶) 與 乙凡(國A++、數A++、英A++、社A+、自A+、作文5級分、身心俱疲、家境小康)，同時選填武陵高中為第一志願，請問誰會錄取？(參考去年資料)", options: ["只有思誼", "只有乙凡", "兩個都錄取", "不一定"], ans: [2] },
            { id: 12, type: "single", text: "低收入戶會在什麼時候篩選？", options: ["比總積分時", "比總積點時", "志願序填寫前就先篩選"], ans: [0] },
            { id: 13, type: "single", text: "情境題2：映竹(國A++、數A、英A+、社A+、自A+、作文2級分) vs 立銘(國A+、數A++、英A、社A++、自A、作文5級分)，請問兩位考生在比積分時，誰會優先錄取？", options: ["映竹", "立銘", "同時"], ans: [1] },
            { id: 14, type: "single", text: "填志願時，高職的同一群不同學系連續填幾個會記為同一志願序？", options: ["3個", "5個", "無限"], ans: [2] },
            { id: 15, type: "multi", text: "為什麼要帶孩子們參加國三千人聯合模考？", options: ["認識其他補習班的人", "增加孩子的實戰經驗", "增加一次模考機會", "讓孩子測試自己文具在會考當天會不會壞掉"], ans: [1, 2] },
            { id: 16, type: "single", text: "關於桃連區免試入學的計分與錄取規則，下列何者正確？", options: ["桃連區免試入學只看國中教育會考成績，總分 100 分中會考占滿 100 分，因此志願序不影響最後錄取結果。", "桃連區免試入學三大計分項目為適性輔導 32 分、多元學習表現 35 分、國中教育會考表現 33 分；若總積分完全相同，仍需依序進行同分比序，因此志願序積分可能影響最終錄取結果。", "桃連區免試入學三大計分項目為志願序 35 分、服務時數 32 分、教育會考 33 分；只要會考成績相同，就一定錄取同一所學校。", "桃連區免試入學中，志願序僅供填表參考，不列入任何積分或比序項目，因此不會影響錄取順序。"], ans: [1] },
            { id: 17, type: "single", text: "請列出會考免試入學超額比序的單科比序科目順序", options: ["國英數社自", "國數英社自", "國數英自社"], ans: [1] },
            { id: 18, type: "multi", text: "舉辦高中參訪的目的是什麼？", options: ["讓孩子看到未來學校能夠有憧憬，重新點燃學習熱忱", "找到自己未來高中成為讀書的目標", "模擬考前出去玩一次", "可以跟同學一起在遊覽車上面開心的吃麥當勞"], ans: [0, 1] },
            { id: 19, type: "single", text: "關於桃連區免試入學的志願序積分，下列何者正確？", options: ["第 1 至 3 志願為 12 分，第 4 至 6 志願為 9 分", "第 1 至 3 志願為 15 分，第 4 至 6 志願為 12 分，第 7 至 9 志願為 9 分", "只要填滿 30 個志願，每一志願都可得 15 分", "志願序不列入積分，只在選填時作為參考"], ans: [1] },
            { id: 20, type: "single", text: "關於桃連區免試入學中「生涯規劃」項目的敘述，下列何者正確？", options: ["只要家長口頭同意即可得分，不需正式確認", "報名校、科只要與家長意見相符即可得滿分 6 分", "報名校、科與家長意見、導師意見、輔導教師意見分別相符者，各得 2 分，合計上限 6 分", "生涯規劃僅供參考，不列入桃連區免試入學總積分"], ans: [2] },
            { id: 21, type: "single", text: "什麼時後會舉辦高中資優班的考試？", options: ["會考之前", "會考成績公布到區排名公布之間", "區排名公布到錄取學校放榜之間", "錄取學校放榜之後"], ans: [3] },
            { id: 22, type: "multi", text: "五專的聯合免試入學中，桃園的考生可以填哪裡的的五專學校？", options: ["台北市", "新北市", "台中市", "高雄市"], ans: [0, 1, 2, 3] },
            { id: 23, type: "single", text: "五專的優先免試入學選填志願時最多可以選擇幾個中區學校的科系？", options: ["1個", "3個", "30個", "1校1科"], ans: [2] },
            { id: 24, type: "single", text: "五專的完全免試入學如何辦理招生？", options: ["每間學校獨立招生", "分為北、中、南三區舉辦招生", "採計會考成績全國統一比序分發", "與居住地同一學區的學校直接申請入學"], ans: [0] },
            { id: 25, type: "single", text: "大園高中IBDP班的錄取方式為何？", options: ["採計會考成績，會考成績達1A4B，且英文為A++即可申請錄取", "不採計會考成績，直接報名IBDP班的特色招生考試並達到錄取標準", "會考達大園高中錄取標準，錄取大園高中後報名IBDP班的特色招生考試並達到錄取標準", "會考達1A4B，直接報名IBDP班的特色招生考試並達到錄取標準"], ans: [3] }
        ];

        let currentUser = "";
        let currentTestMode = "first"; 
        let currentQuestions = []; 
        let userAnswers = {}; 
        let wrongQuestionsList = []; 

        const ALPHABET = ["A", "B", "C", "D", "E"];

        function switchView(viewId) {
            document.querySelectorAll('#view-login, #view-test, #view-result, #view-review').forEach(el => el.classList.add('hidden-view'));
            document.getElementById(viewId).classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function startTest() {
            const nameInput = document.getElementById('teacherName').value.trim();
            if(!nameInput) {
                alert("請輸入您的姓名才能開始測驗喔！");
                return;
            }
            currentUser = nameInput;
            document.getElementById('displayName').innerText = currentUser;
            currentTestMode = "first";
            currentQuestions = questionsData; 
            renderQuestions();
            switchView('view-test');
        }

        function startRetest() {
            currentTestMode = "retest";
            currentQuestions = questionsData.filter(q => wrongQuestionsList.includes(q.id));
            document.getElementById('testTitle').innerText = "🔁 錯題重測進行中";
            renderQuestions();
            switchView('view-test');
        }

        function restartFullTest() {
            currentTestMode = "first";
            currentQuestions = questionsData;
            document.getElementById('testTitle').innerText = "📝 測驗進行中";
            renderQuestions();
            switchView('view-test');
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";
            userAnswers = {}; 
            document.getElementById('errorMessage').classList.add('hidden-view');

            currentQuestions.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-slate-50 p-5 md:p-6 rounded-xl border border-slate-200";
                
                const badgeStr = q.type === 'single' ? 
                    `<span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold ml-2 align-middle border border-blue-200">單選</span>` : 
                    `<span class="bg-orange-100 text-orange-700 text-[10px] px-2 py-0.5 rounded font-bold ml-2 align-middle border border-orange-200">複選</span>`;
                
                let html = `<h3 class="font-bold text-lg text-slate-800 mb-4 leading-relaxed">${index + 1}. ${q.text} ${badgeStr}</h3><div class="space-y-3">`;

                q.options.forEach((opt, optIndex) => {
                    const inputType = q.type === 'single' ? 'radio' : 'checkbox';
                    const inputName = `q_${q.id}`;
                    const inputId = `q_${q.id}_opt_${optIndex}`;
                    
                    html += `
                    <div class="relative">
                        <input type="${inputType}" name="${inputName}" id="${inputId}" value="${optIndex}" class="${inputType}-custom hidden" onchange="recordAnswer(${q.id}, ${optIndex}, '${q.type}')">
                        <label for="${inputId}" class="flex items-center p-3 border border-slate-300 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors text-sm font-medium text-slate-700">
                            <span class="w-6 h-6 flex-shrink-0 bg-white border border-slate-300 ${q.type === 'single' ? 'rounded-full' : 'rounded'} mr-3 flex items-center justify-center font-bold text-xs text-slate-500 shadow-sm option-indicator"></span>
                            ${ALPHABET[optIndex]}. ${opt}
                        </label>
                    </div>`;
                });
                
                html += `</div>`;
                qDiv.innerHTML = html;
                container.appendChild(qDiv);
            });
        }

        window.recordAnswer = function(qId, optIndex, type) {
            const qContainer = document.querySelector(`input[name="q_${qId}"]`).closest('div.space-y-3');
            
            if (type === 'single') {
                userAnswers[qId] = [optIndex];
                qContainer.querySelectorAll('.option-indicator').forEach(ind => {
                    ind.classList.remove('bg-comma-blue', 'border-comma-blue', 'text-white');
                    ind.classList.add('bg-white', 'border-slate-300', 'text-slate-500');
                    ind.innerHTML = "";
                });
                const selectedLabel = document.querySelector(`label[for="q_${qId}_opt_${optIndex}"] .option-indicator`);
                selectedLabel.classList.remove('bg-white', 'text-slate-500');
                selectedLabel.classList.add('bg-comma-blue', 'border-comma-blue', 'text-white');
                selectedLabel.innerHTML = "✓";
            } else {
                if(!userAnswers[qId]) userAnswers[qId] = [];
                const idx = userAnswers[qId].indexOf(optIndex);
                const selectedLabel = document.querySelector(`label[for="q_${qId}_opt_${optIndex}"] .option-indicator`);
                
                if(idx > -1) {
                    userAnswers[qId].splice(idx, 1); 
                    selectedLabel.classList.remove('bg-comma-blue', 'border-comma-blue', 'text-white');
                    selectedLabel.classList.add('bg-white', 'border-slate-300', 'text-slate-500');
                    selectedLabel.innerHTML = "";
                } else {
                    userAnswers[qId].push(optIndex); 
                    selectedLabel.classList.remove('bg-white', 'text-slate-500');
                    selectedLabel.classList.add('bg-comma-blue', 'border-comma-blue', 'text-white');
                    selectedLabel.innerHTML = "✓";
                }
            }
        };

        async function submitTest() {
            let allAnswered = true;
            for(let q of currentQuestions) {
                if(!userAnswers[q.id] || userAnswers[q.id].length === 0) {
                    allAnswered = false; break;
                }
            }
            if(!allAnswered) {
                document.getElementById('errorMessage').classList.remove('hidden-view');
                window.scrollTo(0, document.body.scrollHeight);
                return;
            }
            document.getElementById('errorMessage').classList.add('hidden-view');

            let correctCount = 0;
            wrongQuestionsList = [];
            
            currentQuestions.forEach(q => {
                const uAns = (userAnswers[q.id] || []).sort().join(',');
                const cAns = q.ans.sort().join(',');
                if (uAns === cAns) {
                    correctCount++;
                } else {
                    wrongQuestionsList.push(q.id);
                }
            });

            const totalQ = currentQuestions.length;
            let score = Math.round((correctCount / totalQ) * 100);
            
            if(currentTestMode === 'retest' && wrongQuestionsList.length === 0) {
                score = 100;
            }

            document.getElementById('loadingOverlay').classList.remove('hidden-view');
            
            const payload = {
                name: currentUser,
                type: currentTestMode,
                score: score,
                wrongQs: wrongQuestionsList.join(', ') || "無"
            };

            // 🚀 關鍵解藥：使用 no-cors 模式繞過瀏覽器阻擋
            try {
                if(GAS_API_URL && GAS_API_URL.startsWith("http")) {
                    await fetch(GAS_API_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(payload)
                    });
                } else {
                    console.log("未填入網址，僅供本地測試結算。");
                }
            } catch (e) {
                console.error("傳送時發生預期外的錯誤：", e);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden-view');
                showResult(score, wrongQuestionsList.length);
            }
        }

        function showResult(score, wrongCount) {
            document.getElementById('finalScore').innerText = score;
            
            const circle = document.getElementById('scoreCircle');
            const offset = 439.8 - (439.8 * score) / 100;
            setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);

            const msgEl = document.getElementById('resultMessage');
            const btnRetest = document.getElementById('btnRetest');
            
            if (wrongCount === 0) {
                msgEl.innerText = "🎉 太棒了！您已完全掌握所有升學制度重點！";
                msgEl.className = "text-lg font-black text-green-600 mb-8 text-center";
                btnRetest.classList.add('hidden-view'); 
            } else {
                msgEl.innerText = `📝 尚有 ${wrongCount} 題觀念待釐清，請進行錯題檢討！`;
                msgEl.className = "text-lg font-bold text-orange-600 mb-8 text-center";
                btnRetest.classList.remove('hidden-view');
            }

            switchView('view-result');
        }

        function showReview() {
            const container = document.getElementById('reviewContainer');
            container.innerHTML = "";
            
            if (wrongQuestionsList.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-500 py-10'>您沒有任何錯題喔！🎉</p>";
            } else {
                currentQuestions.forEach((q) => {
                    if(wrongQuestionsList.includes(q.id)) {
                        const uAnsArr = userAnswers[q.id] || [];
                        const uAnsStr = uAnsArr.map(i => ALPHABET[i]).join(', ');
                        const cAnsStr = q.ans.map(i => ALPHABET[i]).join(', ');
                        
                        let optionsHtml = `<ul class="mb-4 space-y-1 text-sm text-slate-600 pl-2">`;
                        q.options.forEach((opt, oIdx) => {
                            optionsHtml += `<li>${ALPHABET[oIdx]}. ${opt}</li>`;
                        });
                        optionsHtml += `</ul>`;
                        
                        container.innerHTML += `
                        <div class="bg-red-50 p-5 md:p-6 rounded-xl border border-red-100 shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-3"><span class="text-red-500">Q:</span> ${q.text}</h3>
                            ${optionsHtml}
                            <div class="flex flex-col md:flex-row gap-3 md:gap-6 text-sm mt-4 border-t border-red-100 pt-4">
                                <div class="flex-1 bg-white px-4 py-3 rounded-lg border border-red-200">
                                    <span class="text-red-500 font-black block text-xs mb-1">你的選擇</span>
                                    <span class="text-slate-800 font-bold">${uAnsStr || '未作答'}</span>
                                </div>
                                <div class="flex-1 bg-white px-4 py-3 rounded-lg border border-green-200">
                                    <span class="text-green-600 font-black block text-xs mb-1">正確解答</span>
                                    <span class="text-slate-800 font-bold">${cAnsStr}</span>
                                </div>
                            </div>
                        </div>`;
                    }
                });
            }
            switchView('view-review');
        }

        function backToResult() {
            switchView('view-result');
        }
    </script>
</body>
</html>
